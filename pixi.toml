[workspace]
authors = ["Matthew Gruner <mgruner01@unr.edu>"]
channels = ["conda-forge","bioconda"]
name = "ceballos_neuropeptide-organization"
platforms = ["osx-64","linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.11,<3.12"
snakemake = ">=9.23.0,<10"
pip = "*"
numba = "*"
llvmlite = "*"
setuptools = "<70"
pyarrow = "*"
numpy = "<2"

[pypi-dependencies]
shap = "*"
torch = ">=2.0.0"
abagen = ">=0.1.3"
bctpy = ">=0.6.1"
brainspace = ">=0.1.10"
joblib = ">=1.3.0"
matplotlib = "==3.8.4"
netneurotools = ">=0.2.5"
neuromaps = ">=0.0.4"
nibabel = ">=5.3.2"
NiMARE = ">=0.2.2"
pandas = ">=2.2.3"
pingouin = ">=0.5.4"
pyparsing = ">=3.2.0"
requests = "*"
scipy = "==1.14.1"
seaborn = ">=0.13.2"
tqdm = ">=4.66.3"
vtk = "<9.4.0"
cca-zoo = "==3.0.0"
surfplot = { git = "https://github.com/eric2302/surfplot.git" }
pyls = { git = "https://github.com/netneurolab/pypyls.git" }
brainconn = { git = "https://github.com/fiuneuro/brainconn.git" }
enigmatoolbox = { url = "https://github.com/MICA-MNI/ENIGMA/archive/refs/heads/master.zip" }


